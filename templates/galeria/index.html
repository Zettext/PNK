<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PEENKAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.3) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(76, 29, 149, 0.3) 0, transparent 50%);
        }

        /* Glassmorphism Ultra-Refinado */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        /* Indicadores estilo Píldora de Apple */
        .carousel-indicators [data-bs-target] {
            width: 12px;
            height: 6px;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.2);
            border: none;
            margin: 0 5px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .carousel-indicators .active {
            width: 35px;
            background-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* Contenedor de imagen */
        .img-viewport {
            height: 680px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
        }

        /* Botones de navegación Estilo Circular Glass */
        .nav-btn {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: white;
        }

        .nav-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
            transform: scale(1.1);
            color: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 py-10 px-4 antialiased">

    <div class="max-w-6xl mx-auto">
        
        <header class="glass-card rounded-[2rem] p-5 mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-10">
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-blue-500 tracking-[0.2em] uppercase">GALERIAPNK</span>
                    <h1 class="text-2xl font-black text-white">Memes PNK de Profes</h1>
                </div>
                
                <form method="post" enctype="multipart/form-data" class="flex items-center">
                    {% csrf_token %}
                    <label class="group relative cursor-pointer overflow-hidden rounded-2xl bg-white/5 border border-white/10 px-6 py-3 transition-all hover:bg-white/10 active:scale-95">
                        <span class="relative z-10 text-sm font-bold flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                            </svg>
                            Subir nueva foto
                        </span>
                        <input type="file" name="imagen" class="hidden" onchange="this.form.submit()" required>
                    </label>
                </form>
            </div>

            <form action="{% url 'logout' %}" method="post" class="inline">
    {% csrf_token %}
    <button type="submit" class="flex items-center gap-2 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-6 py-3 rounded-2xl text-xs font-black transition-all border border-red-500/20 uppercase tracking-widest">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
        </svg>
        Cerrar Sesión
    </button>
</form>
        </header>

        <div class="glass-card rounded-[3rem] overflow-hidden relative">
            
            <div id="galleryCarousel" class="carousel slide" data-bs-ride="carousel">
                
                <div class="carousel-indicators mb-10">
                    {% for foto in fotos %}
                    <button type="button" data-bs-target="#galleryCarousel" data-bs-slide-to="{{ forloop.counter0 }}" 
                            class="{% if forloop.first %}active{% endif %}" aria-label="Slide {{ forloop.counter }}"></button>
                    {% endfor %}
                </div>

                <div class="carousel-inner">
                    {% for foto in fotos %}
                    <div class="carousel-item {% if forloop.first %}active{% endif %}">
                        
                        <a href="{% url 'eliminar_foto' foto.id %}" class="absolute top-8 right-8 z-30 group p-3 bg-black/40 hover:bg-red-600 rounded-2xl backdrop-blur-md border border-white/10 transition-all hover:scale-110">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white/70 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </a>

                        <div class="img-viewport p-10">
                            <img src="{{ foto.imagen.url }}" class="max-w-full max-h-full object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.7)]" alt="Foto">
                        </div>
                    </div>
                    {% empty %}
                    <div class="img-viewport text-slate-500 text-lg font-medium italic">Selecciona una foto arriba para empezar la colección</div>
                    {% endfor %}
                </div>

                {% if fotos|length > 1 %}
                <button class="carousel-control-prev w-28 z-40 opacity-100" type="button" data-bs-target="#galleryCarousel" data-bs-slide="prev">
                    <div class="nav-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                        </svg>
                    </div>
                    <span class="visually-hidden">Anterior</span>
                </button>
                
                <button class="carousel-control-next w-28 z-40 opacity-100" type="button" data-bs-target="#galleryCarousel" data-bs-slide="next">
                    <div class="nav-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                        </svg>
                    </div>
                    <span class="visually-hidden">Siguiente</span>
                </button>
                {% endif %}

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
