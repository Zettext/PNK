<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | Galería Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.3) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(76, 29, 149, 0.3) 0, transparent 50%);
        }

        /* El mismo Glassmorphism de la galería */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        /* Estilo para los inputs de Django */
        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 1rem !important;
            padding: 0.75rem 1rem !important;
            color: white !important;
            outline: none !important;
            transition: all 0.3s ease !important;
        }

        input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2) !important;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #3b82f6;
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased text-slate-100">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <span class="text-xs font-bold text-blue-500 tracking-[0.3em] uppercase">Bienvenido de vuelta</span>
            <h1 class="text-3xl font-black text-white mt-2 tracking-tighter">ACCESO GALERIA<span class="text-blue-500">PNK</span></h1>
        </div>

        <div class="glass-card rounded-[2.5rem] p-10">
            <form method="post">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-sm font-medium">
                    Usuario o contraseña incorrectos.
                </div>
                {% endif %}

                <div class="mb-6">
                    <label for="{{ form.username.id_for_label }}">Usuario</label>
                    {{ form.username }}
                </div>

                <div class="mb-8">
                    <label for="{{ form.password.id_for_label }}">Contraseña</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all shadow-[0_0_20px_rgba(59,130,246,0.3)] hover:shadow-[0_0_30px_rgba(59,130,246,0.5)] active:scale-95 uppercase tracking-widest text-sm">
                    Ingresar al Sistema
                </button>
            </form>
        </div>

        <p class="text-center mt-8 text-slate-500 text-xs font-medium">
            PARA PONER LA *** DE TERMINOS &copy; 2026
        </p>
    </div>

</body>
</html>
